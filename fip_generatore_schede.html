<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIP — Generatore Schede Forza</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --blue:#1A3FA8; --bluedk:#0F2770; --bluelt:#E8EDF8; --bluemid:#C2CFED;
  --g1:#F4F5F7; --g2:#E2E4E9; --g3:#9EA5B5; --g4:#5A6070;
  --text:#1A1E2A; --green:#1A7A3A; --red:#C0392B; --orange:#E67E22;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:#DDE1EA;color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--bluedk);display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:48px;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-logo{height:30px;width:auto}
.topbar-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:rgba(255,255,255,0.9);letter-spacing:0.06em;text-transform:uppercase}
.topbar-right{display:flex;gap:6px;align-items:center}
.btn{font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;padding:6px 13px;border-radius:3px;border:none;cursor:pointer;white-space:nowrap}
.btn:hover{opacity:0.85}
.btn-ghost{background:rgba(255,255,255,0.15);color:white}
.btn-green{background:var(--green);color:white}
.btn-white{background:white;color:var(--blue)}
.btn-orange{background:var(--orange);color:white}
.btn-red{background:var(--red);color:white;font-size:11px;padding:3px 8px}
.main{display:flex;flex:1;overflow:hidden}
.panel{width:280px;background:white;border-right:0.5px solid var(--g2);display:flex;flex-direction:column;flex-shrink:0}
.tabs{display:flex;border-bottom:0.5px solid var(--g2)}
.tab{flex:1;text-align:center;font-size:10px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;padding:9px 4px;color:var(--g3);cursor:pointer;border-bottom:2px solid transparent}
.tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.pscroll{flex:1;overflow-y:auto;padding:12px}
.hide{display:none!important}
.fg{display:flex;flex-direction:column;gap:3px;margin-bottom:7px}
.fg label{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--g3)}
.fg input{font-family:'Barlow',sans-serif;font-size:12px;color:var(--text);background:var(--g1);border:0.5px solid var(--g2);border-radius:3px;padding:5px 8px;outline:none;width:100%}
.fg input:focus{border-color:var(--blue);background:white}
.sec{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--blue);padding:8px 0 4px;border-top:0.5px solid var(--g2);margin-top:2px}
.sec:first-child{border-top:none;margin-top:0;padding-top:0}
.r3{display:flex;gap:4px}
.r3 .fg{flex:1}
.r2{display:flex;gap:4px}
.r2 .fg:first-child{flex:2}
.r2 .fg:last-child{flex:1}
.ath-expand{font-weight:600;font-size:12px;display:flex;align-items:center;gap:5px;cursor:pointer;padding:5px 0 2px;color:var(--text)}
.ath-expand .arrow{font-size:10px;color:var(--g3);transition:transform 0.15s;display:inline-block}
.ath-expand.open .arrow{transform:rotate(90deg)}
.ver-list{padding-left:12px;margin-bottom:4px}
.ver-item{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;border-radius:3px;background:white;border:0.5px solid var(--g2);margin-bottom:2px;font-size:11px;cursor:pointer;color:var(--g4)}
.ver-item:hover{border-color:var(--bluemid);color:var(--blue)}
.ver-item.sel{background:var(--bluelt);border-color:var(--blue);color:var(--blue);font-weight:600}
.master-btn{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:3px;background:var(--bluedk);color:white;cursor:pointer;font-size:12px;font-weight:600;margin-bottom:10px;border:none;width:100%;text-align:left}
.master-btn.sel{background:var(--blue)}
.master-badge{font-size:9px;background:rgba(255,255,255,0.2);padding:1px 6px;border-radius:2px;text-transform:uppercase;letter-spacing:0.06em}
.bcard{background:var(--g1);border:0.5px solid var(--g2);border-radius:3px;padding:8px;margin-bottom:8px}
.bcard-top{display:flex;align-items:center;gap:5px;margin-bottom:6px}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-b{background:var(--blue)}
.dot-g{background:var(--g3)}
.bcard-top input{background:transparent;border:none;outline:none;font-family:'Barlow',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--g4);width:100%}
.esep{height:4px}
.preview-wrap{flex:1;overflow:auto;padding:16px;display:flex;flex-direction:column;align-items:center}
.mode-banner{width:750px;padding:7px 14px;border-radius:3px 3px 0 0;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0}
.banner-master{background:var(--bluedk);color:white}
.banner-atleta{background:var(--green);color:white}
.page{width:750px;background:white;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,0.12);flex-shrink:0;border-radius:0 0 4px 4px}
.sh{background:var(--blue);display:flex;align-items:stretch;min-height:74px}
.sh-logo{padding:8px 12px;display:flex;align-items:center}
.sh-logo img{height:52px;width:auto}
.sh-line{width:3px;background:linear-gradient(to bottom,#009246 33%,#fff 33%,#fff 66%,#C8102E 66%);margin:8px 0;border-radius:2px;flex-shrink:0}
.sh-info{flex:1;padding:10px 14px;display:flex;flex-direction:column;justify-content:center}
.sh-name{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;color:white;text-transform:uppercase;letter-spacing:0.04em;line-height:1}
.sh-sess{padding:10px 14px;display:flex;flex-direction:column;justify-content:center;align-items:flex-end;gap:5px;min-width:185px}
.sh-stitle{font-size:17px;font-weight:500;color:white;text-transform:uppercase;text-align:right;font-family:'Barlow Condensed',sans-serif}
.sh-badges{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.sbadge{font-size:9px;font-weight:600;padding:2px 7px;border-radius:2px;text-transform:uppercase;letter-spacing:0.05em}
.sb1{background:rgba(255,255,255,0.13);color:rgba(255,255,255,0.9)}
.sb2{background:#1A7A3A;color:white}
.sb3{background:#C0392B;color:white}
.sbody{padding:12px 14px 16px;background:white}
.sblock{border:0.5px solid var(--g2);border-radius:3px;overflow:hidden}
.ssep{height:8px}
.sbhead{display:flex;align-items:center;padding:4px 9px;border-bottom:0.5px solid var(--g2)}
.sbh-blue{background:var(--blue)}
.sbh-act{background:var(--bluelt)}
.sbh-gray{background:var(--g1)}
.sbtag{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:1px 7px;border-radius:2px}
.sbt-w{color:white}
.sbt-b{color:var(--blue)}
.sbt-g{color:var(--g4)}
.act-grid{display:grid;grid-template-columns:1fr 1fr}
.act-row{display:flex;align-items:center;gap:6px;padding:4px 8px;border-bottom:0.5px solid var(--g2);border-right:0.5px solid var(--g2);font-size:11px}
.actn{font-size:10px;font-weight:700;color:var(--blue);min-width:13px}
.actex{font-weight:500;flex:1;color:var(--text)}
.acts{font-size:10px;color:var(--g3);white-space:nowrap}
.stable{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed}
.stable col.cn{width:auto}
.stable col.cs{width:44px}
.stable col.cr{width:52px}
.stable col.cc{width:60px}
.stable col.cno{width:170px}
.stable .throw thead tr{background:white;border-bottom:0.5px solid var(--g2)}
.stable .throw thead th{font-size:9px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--g3);padding:4px 7px;text-align:left}
.stable .throw thead th.tc{text-align:center}
.stable .noth thead{display:none}
.stable tbody tr{border-bottom:0.5px solid var(--g2)}
.stable tbody tr:last-child{border-bottom:none}
.stable tbody tr:nth-child(even){background:#FAFBFC}
.stable td{padding:4px 7px;vertical-align:middle;color:var(--text)}
.stable td.tn{font-weight:600}
.stable td.tc{text-align:center}
.stable td.tno{color:var(--g3);font-size:10px}
.sfooter{background:var(--g1);border-top:1.5px solid var(--bluemid);padding:7px 14px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.sfn{font-size:10px;color:var(--g3);flex:1}
.sfp{font-size:10px;font-weight:600;color:var(--blue);text-align:right;white-space:nowrap}
.sfp span{font-weight:400;color:var(--g3);display:block}
.empty{color:var(--g3);font-size:13px;text-align:center;padding:60px 20px;line-height:1.9}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:white;border-radius:6px;padding:24px;width:340px;box-shadow:0 8px 32px rgba(0,0,0,0.18)}
.modal h3{font-size:15px;font-weight:600;margin-bottom:16px;color:var(--text)}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.modal-actions .btn{flex:1;padding:8px}
@media print{
  .topbar,.panel,.mode-banner{display:none!important}
  .main{display:block;height:auto}
  .preview-wrap{padding:0;display:block}
  body{background:white;height:auto;overflow:visible}
  .page{box-shadow:none;border-radius:0;width:100%}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <img class="topbar-logo" src="fip_logo.png" alt="FIP">
    <span class="topbar-title">Generatore Schede Forza</span>
  </div>
  <div class="topbar-right">
    <button class="btn btn-orange" onclick="apriModaleSalva()">Salva come atleta</button>
    <button class="btn btn-ghost" onclick="esportaJSON()">Esporta dati</button>
    <button class="btn btn-ghost" onclick="importaJSON()">Importa dati</button>
    <button class="btn btn-white" onclick="stampa()">Stampa PDF</button>
  </div>
</div>

<div class="main">
  <div class="panel">
    <div class="tabs">
      <div class="tab on" id="t-nav" onclick="showTab('nav')">Archivio</div>
      <div class="tab" id="t-scheda" onclick="showTab('scheda')">Scheda</div>
      <div class="tab" id="t-act" onclick="showTab('act')">Activation</div>
    </div>
    <div class="pscroll" id="tab-nav">
      <button class="master-btn" id="btn-master" onclick="selMaster()">
        <span style="flex:1">Master Template</span>
        <span class="master-badge">base</span>
      </button>
      <div class="sec" style="margin-bottom:6px">Atleti</div>
      <div id="ath-tree"></div>
      <div style="margin-top:8px">
        <button class="btn" style="width:100%;background:var(--g1);color:var(--g4);border:0.5px solid var(--g2)" onclick="importaJSON()">+ Importa dati salvati</button>
      </div>
    </div>
    <div class="pscroll hide" id="tab-scheda">
      <div class="sec">Sessione</div>
      <div class="fg"><label>Titolo</label><input type="text" id="f-sess" oninput="aggiorna()"></div>
      <div class="fg"><label>Badge 1</label><input type="text" id="f-b1" oninput="aggiorna()"></div>
      <div class="fg"><label>Badge 2</label><input type="text" id="f-b2" oninput="aggiorna()"></div>
      <div class="fg"><label>Badge 3</label><input type="text" id="f-b3" oninput="aggiorna()"></div>
      <div class="sec">Blocchi</div>
      <div id="form-blocks"></div>
      <div class="sec">Footer</div>
      <div class="fg"><label>Note recupero</label><input type="text" id="f-footer" oninput="aggiorna()"></div>
      <div class="fg"><label>Preparatore</label><input type="text" id="f-prep" oninput="aggiorna()"></div>
    </div>
    <div class="pscroll hide" id="tab-act">
      <div class="sec">8 esercizi</div>
      <div id="form-act"></div>
    </div>
  </div>

  <div class="preview-wrap">
    <div class="empty" id="empty-msg">Seleziona il <strong>Master Template</strong><br>o una scheda atleta<br>per iniziare.</div>
    <div id="mode-banner" class="mode-banner hide"></div>
    <div id="preview" class="hide"></div>
  </div>
</div>

<div class="modal-bg hide" id="modal-salva">
  <div class="modal">
    <h3>Salva scheda come atleta</h3>
    <div class="fg"><label>Nome atleta</label><input type="text" id="m-atleta" placeholder="Es. Marco Ferretti"></div>
    <div class="fg"><label>Versione</label><input type="text" id="m-versione" placeholder="Es. Offseason Sett.1 Day1"></div>
    <div class="modal-actions">
      <button class="btn btn-green" onclick="confermaSalva()">Salva</button>
      <button class="btn" style="background:var(--g1);color:var(--g4)" onclick="chiudiModal()">Annulla</button>
    </div>
  </div>
</div>

<input type="file" id="file-input" accept=".json" style="display:none" onchange="leggiJSON(event)">

<script>
var LOGO_URL = 'fip_logo.png';
var master, atleti, mode, selAtleta, selVer, expandedAth;

function init() {
  master = defMaster();
  atleti = {};
  mode = 'master';
  selAtleta = null;
  selVer = null;
  expandedAth = {};
  renderTree();
  selMaster();
}

function defMaster() {
  return {
    session: 'Day 1 - Lower / Squat',
    b1: 'Offseason 2026', b2: 'Sett. -', b3: 'Forza max',
    footer: 'Recupero: 3min Superset A - 90sec B-E', prep: '',
    activation: [
      {name:'Foam Rolling + Mobility Flow', sets:''},
      {name:'Ankle Dorsiflexion', sets:'2x10+10'},
      {name:'Hips 90/90', sets:''},
      {name:'Couch Stretch w/ band', sets:''},
      {name:'Dead Bugs', sets:'3x8+8'},
      {name:'Glute Bridges', sets:'3x15'},
      {name:'Tennis Ball Raises', sets:'2x10'},
      {name:'Spanish Band Squat Iso', sets:'3x30s'}
    ],
    blocks: [
      {label:'Superset A', style:'blue', rows:[
        {name:'Barbell Squat', serie:'', rip:'', carico:'', note:''},
        {name:'Jump Squat', serie:'', rip:'', carico:'', note:''}
      ]},
      {label:'Superset B', style:'gray', rows:[
        {name:'Split Squat', serie:'', rip:'', carico:'', note:''},
        {name:'Mini Band 3 Ways', serie:'', rip:'', carico:'', note:''}
      ]},
      {label:'Superset C', style:'gray', rows:[
        {name:'Barbell RDL', serie:'', rip:'', carico:'', note:''},
        {name:'Ankle Eversion w/ Miniband', serie:'', rip:'', carico:'', note:''}
      ]},
      {label:'Superset D', style:'gray', rows:[
        {name:'Nordic Hamstring', serie:'', rip:'', carico:'', note:''},
        {name:'SL Bent Knee Soleus Raise', serie:'', rip:'', carico:'', note:''}
      ]},
      {label:'Superset E', style:'gray', rows:[
        {name:'Pallof Press', serie:'', rip:'', carico:'', note:''},
        {name:'Ab Wheel Roll Out', serie:'', rip:'', carico:'', note:''}
      ]}
    ]
  };
}

function deepCopy(o) { return JSON.parse(JSON.stringify(o)); }
function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }
function currentScheda() {
  if (mode === 'master') return master;
  if (mode === 'atleta' && selAtleta !== null && selVer !== null) return atleti[selAtleta][selVer].scheda;
  return null;
}

function showTab(t) {
  ['nav','scheda','act'].forEach(function(x) {
    document.getElementById('tab-'+x).classList.toggle('hide', x !== t);
    document.getElementById('t-'+x).classList.toggle('on', x === t);
  });
}

function selMaster() {
  mode = 'master';
  selAtleta = null;
  selVer = null;
  loadForm(master);
  renderTree();
  renderPreview();
  document.getElementById('btn-master').classList.add('sel');
}

function renderTree() {
  var el = document.getElementById('ath-tree');
  var nomi = Object.keys(atleti);
  if (!nomi.length) {
    el.innerHTML = '<div style="font-size:11px;color:var(--g3);text-align:center;padding:8px 0">Nessuna scheda salvata</div>';
    return;
  }
  el.innerHTML = nomi.map(function(nome) {
    var isOpen = expandedAth[nome];
    var vers = atleti[nome];
    var verHTML = '';
    if (isOpen) {
      verHTML = '<div class="ver-list">' + vers.map(function(v, i) {
        var isSel = mode === 'atleta' && selAtleta === nome && selVer === i;
        return '<div class="ver-item' + (isSel ? ' sel' : '') + '" onclick="selVersione('' + nome.replace(/'/g,"\'") + '',' + i + ')">' +
          '<span>' + esc(v.versione) + '</span>' +
          '<button class="btn btn-red" onclick="event.stopPropagation();eliminaVersione('' + nome.replace(/'/g,"\'") + '',' + i + ')">x</button>' +
          '</div>';
      }).join('') + '</div>';
    }
    return '<div><div class="ath-expand' + (isOpen ? ' open' : '') + '" onclick="toggleAth('' + nome.replace(/'/g,"\'") + '')">' +
      '<span class="arrow">&#9658;</span>' +
      '<span style="flex:1;font-size:12px">' + esc(nome) + '</span>' +
      '<span style="font-size:10px;color:var(--g3)">' + vers.length + ' ver.</span>' +
      '</div>' + verHTML + '</div>';
  }).join('');
}

function toggleAth(nome) { expandedAth[nome] = !expandedAth[nome]; renderTree(); }

function selVersione(nome, idx) {
  mode = 'atleta';
  selAtleta = nome;
  selVer = idx;
  loadForm(atleti[nome][idx].scheda);
  renderTree();
  renderPreview();
  document.getElementById('btn-master').classList.remove('sel');
}

function eliminaVersione(nome, idx) {
  if (!confirm('Eliminare "' + atleti[nome][idx].versione + '"?')) return;
  atleti[nome].splice(idx, 1);
  if (atleti[nome].length === 0) delete atleti[nome];
  if (selAtleta === nome && selVer === idx) selMaster();
  renderTree();
}

function apriModaleSalva() {
  document.getElementById('m-atleta').value = selAtleta || '';
  document.getElementById('m-versione').value = '';
  document.getElementById('modal-salva').classList.remove('hide');
  document.getElementById('m-atleta').focus();
}
function chiudiModal() { document.getElementById('modal-salva').classList.add('hide'); }
function confermaSalva() {
  var nome = document.getElementById('m-atleta').value.trim();
  var ver = document.getElementById('m-versione').value.trim();
  if (!nome || !ver) { alert('Inserisci nome atleta e versione'); return; }
  leggiForm();
  var scheda = deepCopy(currentScheda());
  if (!atleti[nome]) atleti[nome] = [];
  atleti[nome].push({ versione: ver, data: new Date().toLocaleDateString('it-IT'), scheda: scheda });
  expandedAth[nome] = true;
  chiudiModal();
  renderTree();
  selVersione(nome, atleti[nome].length - 1);
}

function loadForm(a) {
  document.getElementById('f-sess').value = a.session || '';
  document.getElementById('f-b1').value = a.b1 || '';
  document.getElementById('f-b2').value = a.b2 || '';
  document.getElementById('f-b3').value = a.b3 || '';
  document.getElementById('f-footer').value = a.footer || '';
  document.getElementById('f-prep').value = a.prep || '';
  buildBlocks(a.blocks);
  buildAct(a.activation);
}

function buildBlocks(blocks) {
  document.getElementById('form-blocks').innerHTML = blocks.map(function(bl, bi) {
    var dot = bl.style === 'blue' ? 'dot-b' : 'dot-g';
    var rows = bl.rows.map(function(row, ri) {
      return '<div class="fg"><label>Esercizio ' + (ri+1) + '</label>' +
        '<input type="text" id="b'+bi+'r'+ri+'n" value="'+esc(row.name)+'" oninput="aggiorna()"></div>' +
        '<div class="r3">' +
        '<div class="fg"><label>Serie</label><input type="text" id="b'+bi+'r'+ri+'s" value="'+esc(row.serie)+'" oninput="aggiorna()"></div>' +
        '<div class="fg"><label>Rip</label><input type="text" id="b'+bi+'r'+ri+'r" value="'+esc(row.rip)+'" oninput="aggiorna()"></div>' +
        '<div class="fg"><label>Carico</label><input type="text" id="b'+bi+'r'+ri+'c" value="'+esc(row.carico)+'" oninput="aggiorna()"></div>' +
        '</div>' +
        '<div class="fg"><label>Note</label><input type="text" id="b'+bi+'r'+ri+'no" value="'+esc(row.note)+'" oninput="aggiorna()"></div>' +
        '<div class="esep"></div>';
    }).join('');
    return '<div class="bcard"><div class="bcard-top"><div class="dot ' + dot + '"></div>' +
      '<input type="text" id="bl'+bi+'l" value="'+esc(bl.label)+'" oninput="aggiorna()"></div>' +
      rows + '</div>';
  }).join('');
}

function buildAct(act) {
  document.getElementById('form-act').innerHTML = act.map(function(ex, i) {
    return '<div class="r2">' +
      '<div class="fg"><label>Es. '+(i+1)+'</label><input type="text" id="act'+i+'n" value="'+esc(ex.name)+'" oninput="aggiorna()"></div>' +
      '<div class="fg"><label>Serie</label><input type="text" id="act'+i+'s" value="'+esc(ex.sets)+'" oninput="aggiorna()"></div>' +
      '</div>';
  }).join('');
}

function leggiForm() {
  var a = currentScheda();
  if (!a) return;
  a.session = document.getElementById('f-sess').value;
  a.b1 = document.getElementById('f-b1').value;
  a.b2 = document.getElementById('f-b2').value;
  a.b3 = document.getElementById('f-b3').value;
  a.footer = document.getElementById('f-footer').value;
  a.prep = document.getElementById('f-prep').value;
  a.blocks.forEach(function(bl, bi) {
    var l = document.getElementById('bl'+bi+'l'); if (l) bl.label = l.value;
    bl.rows.forEach(function(row, ri) {
      var n=document.getElementById('b'+bi+'r'+ri+'n'); if(n) row.name=n.value;
      var s=document.getElementById('b'+bi+'r'+ri+'s'); if(s) row.serie=s.value;
      var r=document.getElementById('b'+bi+'r'+ri+'r'); if(r) row.rip=r.value;
      var c=document.getElementById('b'+bi+'r'+ri+'c'); if(c) row.carico=c.value;
      var no=document.getElementById('b'+bi+'r'+ri+'no'); if(no) row.note=no.value;
    });
  });
  a.activation.forEach(function(ex, i) {
    var n=document.getElementById('act'+i+'n'); if(n) ex.name=n.value;
    var s=document.getElementById('act'+i+'s'); if(s) ex.sets=s.value;
  });
}

      '<table class="stable"><colgroup><col class="cn"><col class="cs"><col class="cr"><col class="cc"><col class="cno"></colgroup>'+thead+'<tbody>'+rows+'</tbody></table></div>';
  }).join('');
  prevEl.innerHTML =
    '<div class="page">' +

    '<div class="sh-line"></div>' +

    '<div class="sh-sess"><div class="sh-stitle">'+esc(a.session)+'</div>' +
    '<div class="sh-badges">'+(a.b1?'<span class="sbadge sb1">'+esc(a.b1)+'</span>':'')+(a.b2?'<span class="sbadge sb2">'+esc(a.b2)+'</span>':'')+(a.b3?'<span class="sbadge sb3">'+esc(a.b3)+'</span>':'')+'</div></div></div>' +

function esportaJSON() {
  leggiForm();
  var data = {master: master, atleti: atleti};
  var blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href=url; a.download='fip_dati.json'; a.click();
  URL.revokeObjectURL(url);
}
function importaJSON() { document.getElementById('file-input').click(); }
function leggiJSON(ev) {
  var file = ev.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if (data.master) master = data.master;
      if (data.atleti) atleti = data.atleti;
      selMaster();
      renderTree();
      alert('Dati importati!');
    } catch(err) { alert('File non valido'); }
  };
  reader.readAsText(file);
  ev.target.value = '';
}
