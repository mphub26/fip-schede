
<style>
  :root {
    --fblue: #1A3FA8; --fbluedk: #0F2770; --fbluelt: #E8EDF8; --fbluemid: #C2CFED;
    --fg1: #F4F5F7; --fg2: #E2E4E9; --fg3: #9EA5B5; --fg4: #5A6070;
    --ftext: #1A1E2A; --fgreen: #1A7A3A; --fred: #C0392B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  #app { display: flex; flex-direction: column; height: 620px; font-family: var(--font-sans); background: var(--color-background-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; border: 0.5px solid var(--color-border-tertiary); }
  .topbar { background: var(--fbluedk); display: flex; align-items: center; justify-content: space-between; padding: 0 14px; height: 44px; flex-shrink: 0; }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .fip-icon { width: 28px; height: 28px; flex-shrink: 0; }
  .topbar-title { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.9); letter-spacing: 0.06em; text-transform: uppercase; }
  .topbar-right { display: flex; gap: 6px; }
  .tbtn { font-size: 11px; font-weight: 500; padding: 5px 11px; border-radius: 3px; border: none; cursor: pointer; }
  .tbtn-ghost { background: rgba(255,255,255,0.12); color: white; }
  .tbtn-green { background: var(--fgreen); color: white; }
  .tbtn-white { background: white; color: var(--fblue); }
  .tbtn:hover { opacity: 0.85; }
  .main { display: flex; flex: 1; overflow: hidden; }
  .panel { width: 260px; background: var(--color-background-primary); border-right: 0.5px solid var(--color-border-tertiary); display: flex; flex-direction: column; flex-shrink: 0; }
  .tabs { display: flex; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .tab { flex: 1; text-align: center; font-size: 10px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; padding: 9px 4px; color: var(--color-text-secondary); cursor: pointer; border-bottom: 2px solid transparent; }
  .tab.on { color: var(--fblue); border-bottom-color: var(--fblue); }
  .pscroll { flex: 1; overflow-y: auto; padding: 12px; }
  .hide { display: none !important; }
  .fg { display: flex; flex-direction: column; gap: 3px; margin-bottom: 7px; }
  .fg label { font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-text-secondary); }
  .fg input { font-size: 12px; color: var(--color-text-primary); background: var(--color-background-secondary); border: 0.5px solid var(--color-border-secondary); border-radius: 4px; padding: 4px 7px; outline: none; width: 100%; }
  .fg input:focus { border-color: var(--fblue); }
  .sec { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fblue); padding: 8px 0 4px; border-top: 0.5px solid var(--color-border-tertiary); margin-top: 2px; }
  .sec:first-child { border-top: none; margin-top: 0; padding-top: 0; }
  .r3 { display: flex; gap: 4px; }
  .r3 .fg { flex: 1; }
  .r2 { display: flex; gap: 4px; }
  .r2 .fg:first-child { flex: 2; }
  .r2 .fg:last-child { flex: 1; }
  .ath-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 9px; border-radius: 4px; background: var(--color-background-secondary); cursor: pointer; font-size: 12px; font-weight: 500; border: 0.5px solid var(--color-border-tertiary); margin-bottom: 4px; color: var(--color-text-primary); }
  .ath-item:hover { border-color: var(--fbluemid); }
  .ath-item.sel { background: var(--fbluelt); border-color: var(--fbluemid); color: var(--fblue); }
  .dbtn { font-size: 10px; padding: 2px 7px; border-radius: 3px; border: none; cursor: pointer; background: var(--fred); color: white; }
  .bcard { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: 4px; padding: 8px; margin-bottom: 8px; }
  .bcard-top { display: flex; align-items: center; gap: 5px; margin-bottom: 6px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-b { background: var(--fblue); }
  .dot-g { background: var(--fg3); }
  .bcard-top input { background: transparent; border: none; outline: none; font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg4); width: 100%; }
  .esep { height: 4px; }
  .preview { flex: 1; overflow: auto; padding: 16px; display: flex; justify-content: center; align-items: flex-start; }
  .empty { color: var(--color-text-secondary); font-size: 13px; text-align: center; padding: 60px 20px; line-height: 1.8; }

  /* SCHEDA PRINT */
  .page { width: 680px; background: white; border-radius: 4px; overflow: hidden; box-shadow: 0 2px 16px rgba(0,0,0,0.12); flex-shrink: 0; }
  .sh { background: var(--fblue); display: flex; align-items: stretch; min-height: 74px; }
  .sh-logo { padding: 8px 12px; display: flex; align-items: center; }
  .sh-line { width: 3px; background: linear-gradient(to bottom,#009246 33%,#fff 33%,#fff 66%,#C8102E 66%); margin: 8px 0; border-radius: 2px; flex-shrink: 0; }
  .sh-info { flex: 1; padding: 10px 14px; display: flex; flex-direction: column; justify-content: center; }
  .sh-name { font-size: 24px; font-weight: 500; color: white; text-transform: uppercase; letter-spacing: 0.04em; line-height: 1; font-family: var(--font-sans); }
  .sh-sess { padding: 10px 14px; display: flex; flex-direction: column; justify-content: center; align-items: flex-end; gap: 5px; min-width: 185px; }
  .sh-stitle { font-size: 17px; font-weight: 500; color: white; text-transform: uppercase; text-align: right; }
  .sh-badges { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }
  .sbadge { font-size: 9px; font-weight: 500; padding: 2px 7px; border-radius: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
  .sb1 { background: rgba(255,255,255,0.13); color: rgba(255,255,255,0.9); }
  .sb2 { background: #1A7A3A; color: white; }
  .sb3 { background: #C0392B; color: white; }
  .sbody { padding: 12px 14px 16px; background: white; }
  .sblock { border: 0.5px solid #E2E4E9; border-radius: 3px; overflow: hidden; }
  .ssep { height: 8px; }
  .sbhead { display: flex; align-items: center; padding: 4px 9px; border-bottom: 0.5px solid #E2E4E9; }
  .sbh-blue { background: var(--fblue); }
  .sbh-act { background: var(--fbluelt); }
  .sbh-gray { background: #F4F5F7; }
  .sbtag { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; padding: 1px 7px; border-radius: 2px; }
  .sbt-w { color: white; }
  .sbt-b { color: var(--fblue); }
  .sbt-g { color: var(--fg4); }
  .act-grid { display: grid; grid-template-columns: 1fr 1fr; }
  .act-row { display: flex; align-items: center; gap: 6px; padding: 4px 8px; border-bottom: 0.5px solid #E2E4E9; border-right: 0.5px solid #E2E4E9; font-size: 11px; }
  .actn { font-size: 10px; font-weight: 500; color: var(--fblue); min-width: 13px; }
  .actex { font-weight: 500; flex: 1; color: #1A1E2A; }
  .acts { font-size: 10px; color: var(--fg3); white-space: nowrap; }
  .stable { width: 100%; border-collapse: collapse; font-size: 11px; table-layout: fixed; }
  .stable col.cn { width: auto; }
  .stable col.cs { width: 44px; }
  .stable col.cr { width: 52px; }
  .stable col.cc { width: 60px; }
  .stable col.cno { width: 170px; }
  .stable .throw thead tr { background: white; border-bottom: 0.5px solid #E2E4E9; }
  .stable .throw thead th { font-size: 9px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: var(--fg3); padding: 4px 7px; text-align: left; }
  .stable .throw thead th.tc { text-align: center; }
  .stable .noth thead { display: none; }
  .stable tbody tr { border-bottom: 0.5px solid #E2E4E9; }
  .stable tbody tr:last-child { border-bottom: none; }
  .stable tbody tr:nth-child(even) { background: #FAFBFC; }
  .stable td { padding: 4px 7px; vertical-align: middle; color: #1A1E2A; }
  .stable td.tn { font-weight: 500; }
  .stable td.tc { text-align: center; }
  .stable td.tno { color: var(--fg3); font-size: 10px; }
  .sfooter { background: #F4F5F7; border-top: 1.5px solid var(--fbluemid); padding: 7px 14px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .sfn { font-size: 10px; color: var(--fg3); flex: 1; }
  .sfp { font-size: 10px; font-weight: 500; color: var(--fblue); text-align: right; white-space: nowrap; }
  .sfp span { font-weight: 400; color: var(--fg3); display: block; }
</style>

<h2 class="sr-only">Generatore schede forza FIP — crea e modifica le schede dei tuoi atleti</h2>

<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <svg class="fip-icon" viewBox="0 0 100 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 2 L92 18 L92 60 C92 88 50 118 50 118 C50 118 8 88 8 60 L8 18 Z" fill="white" fill-opacity="0.15" stroke="white" stroke-width="2"/>
        <path d="M50 12 L84 26 L84 60 C84 82 50 108 50 108 C50 108 16 82 16 60 L16 26 Z" fill="white" fill-opacity="0.1"/>
        <text x="50" y="75" text-anchor="middle" font-family="sans-serif" font-size="42" font-weight="700" fill="white">FIP</text>
        <rect x="25" y="8" width="15" height="7" rx="1" fill="#009246"/>
        <rect x="42" y="6" width="16" height="7" rx="1" fill="white"/>
        <rect x="60" y="8" width="15" height="7" rx="1" fill="#C8102E"/>
      </svg>
      <span class="topbar-title">Generatore Schede Forza</span>
    </div>
    <div class="topbar-right">
      <button class="tbtn tbtn-ghost" onclick="showNew()">+ Nuovo atleta</button>
      <button class="tbtn tbtn-green" id="btn-salva" onclick="salva()">Salva JSON</button>
      <button class="tbtn tbtn-white" onclick="stampa()">Stampa PDF</button>
    </div>
  </div>

  <div class="main">
    <div class="panel">
      <div class="tabs">
        <div class="tab on" id="t-atleti" onclick="showTab('atleti')">Atleti</div>
        <div class="tab" id="t-scheda" onclick="showTab('scheda')">Scheda</div>
        <div class="tab" id="t-act" onclick="showTab('act')">Activation</div>
      </div>
      <div class="pscroll" id="tab-atleti">
        <div id="new-form" class="hide">
          <div class="fg"><label>Nome atleta</label><input type="text" id="inp-nome" placeholder="Es. Marco Ferretti" onkeydown="if(event.key==='Enter')crea()"></div>
          <div style="display:flex;gap:6px;margin-bottom:10px">
            <button class="tbtn tbtn-green" style="flex:1" onclick="crea()">Crea</button>
            <button class="tbtn tbtn-ghost" style="flex:1;background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-secondary)" onclick="hideNew()">Annulla</button>
          </div>
        </div>
        <div id="ath-list"></div>
      </div>
      <div class="pscroll hide" id="tab-scheda">
        <div class="sec">Sessione</div>
        <div class="fg"><label>Titolo</label><input type="text" id="f-sess" oninput="aggiorna()"></div>
        <div class="fg"><label>Badge 1</label><input type="text" id="f-b1" oninput="aggiorna()"></div>
        <div class="fg"><label>Badge 2</label><input type="text" id="f-b2" oninput="aggiorna()"></div>
        <div class="fg"><label>Badge 3</label><input type="text" id="f-b3" oninput="aggiorna()"></div>
        <div class="sec">Blocchi</div>
        <div id="form-blocks"></div>
        <div class="sec">Footer</div>
        <div class="fg"><label>Note</label><input type="text" id="f-footer" oninput="aggiorna()"></div>
        <div class="fg"><label>Preparatore</label><input type="text" id="f-prep" oninput="aggiorna()"></div>
      </div>
      <div class="pscroll hide" id="tab-act">
        <div class="sec">8 esercizi</div>
        <div id="form-act"></div>
      </div>
    </div>

    <div class="preview" id="preview-area">
      <div class="empty" id="empty-msg">Clicca <strong>+ Nuovo atleta</strong><br>per iniziare.</div>
      <div id="preview" class="hide"></div>
    </div>
  </div>
</div>

<script>
var db = {}, cid = null;
function uid(){ return 'a'+Date.now()+Math.floor(Math.random()*1000); }
function e(s){ return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''; }

function def(nome){
  return {name:nome,session:'Day 1 — Lower / Squat',b1:'Offseason 2026',b2:'Sett. 1/4',b3:'Forza max',
    footer:"Recupero: 3' Superset A · 90\" B-E",prep:'',
    activation:[
      {name:'Foam Rolling + Mobility Flow',sets:''},
      {name:'Ankle Dorsiflexion',sets:'2×10+10'},
      {name:'Hips 90/90',sets:''},
      {name:'Couch Stretch w/ band',sets:''},
      {name:'Dead Bugs',sets:'3×8+8'},
      {name:'Glute Bridges',sets:'3×15'},
      {name:'Tennis Ball Raises',sets:'2×10'},
      {name:'Spanish Band Squat Iso',sets:'3×30"'}
    ],
    blocks:[
      {label:'Superset A',style:'blue',rows:[
        {name:'Barbell Squat',serie:'1+4',rip:'6',carico:'',note:'Tempo 2" in buca, esplosiva in salita'},
        {name:'Jump Squat',serie:'4',rip:'4',carico:'',note:'Intenzione max, rimbalzo elastico'}
      ]},
      {label:'Superset B',style:'gray',rows:[
        {name:'Split Squat',serie:'3',rip:'4+4',carico:'',note:'Tempo 3":3":1"'},
        {name:'Mini Band 3 Ways',serie:'2',rip:'3×3',carico:'',note:'3 rip per direzione'}
      ]},
      {label:'Superset C',style:'gray',rows:[
        {name:'Barbell RDL',serie:'3',rip:'8',carico:'',note:'Discesa controllata 3"'},
        {name:'Ankle Eversion w/ Miniband',serie:'3',rip:'10+10',carico:'',note:'Seduto, piede libero'}
      ]},
      {label:'Superset D',style:'gray',rows:[
        {name:'Nordic Hamstring',serie:'3',rip:'5',carico:'',note:'Frenata lenta'},
        {name:'SL Bent Knee Soleus Raise',serie:'3',rip:'10+10',carico:'',note:'Con manubrio, ginocchio 90°'}
      ]},
      {label:'Superset E',style:'gray',rows:[
        {name:'Pallof Press',serie:'3',rip:'10+10',carico:'',note:'Con band, tenuta 2"'},
        {name:'Ab Wheel Roll Out',serie:'3',rip:'10',carico:'',note:'Stop prima cedimento lombare'}
      ]}
    ]
  };
}

function showTab(t){
  ['atleti','scheda','act'].forEach(function(x){
    document.getElementById('tab-'+x).classList.toggle('hide', x!==t);
    document.getElementById('t-'+x).classList.toggle('on', x===t);
  });
}

function showNew(){
  document.getElementById('new-form').classList.remove('hide');
  document.getElementById('inp-nome').focus();
}
function hideNew(){
  document.getElementById('new-form').classList.add('hide');
  document.getElementById('inp-nome').value='';
}
function crea(){
  var n=document.getElementById('inp-nome').value.trim();
  if(!n) return;
  var id=uid();
  db[id]=def(n);
  hideNew();
  sel(id);
  renderList();
}
function renderList(){
  var ids=Object.keys(db);
  var el=document.getElementById('ath-list');
  if(!ids.length){el.innerHTML='<div style="font-size:12px;color:var(--color-text-secondary);text-align:center;padding:12px 0">Nessun atleta</div>';return;}
  el.innerHTML=ids.map(function(id){
    return '<div class="ath-item'+(id===cid?' sel':'')+'" onclick="sel(\''+id+'\')">'+
      '<span>'+e(db[id].name)+'</span>'+
      '<button class="dbtn" onclick="event.stopPropagation();del(\''+id+'\')">✕</button>'+
      '</div>';
  }).join('');
}
function sel(id){
  cid=id;
  loadForm(db[id]);
  renderList();
  renderPreview();
}
function del(id){
  if(!confirm('Eliminare '+db[id].name+'?')) return;
  delete db[id];
  if(cid===id){cid=null;document.getElementById('preview').classList.add('hide');document.getElementById('empty-msg').classList.remove('hide');}
  renderList();
}

function loadForm(a){
  document.getElementById('f-sess').value=a.session||'';
  document.getElementById('f-b1').value=a.b1||'';
  document.getElementById('f-b2').value=a.b2||'';
  document.getElementById('f-b3').value=a.b3||'';
  document.getElementById('f-footer').value=a.footer||'';
  document.getElementById('f-prep').value=a.prep||'';
  buildBlocks(a.blocks);
  buildAct(a.activation);
}
function buildBlocks(blocks){
  document.getElementById('form-blocks').innerHTML=blocks.map(function(bl,bi){
    var dot=bl.style==='blue'?'dot-b':'dot-g';
    var rows=bl.rows.map(function(row,ri){
      return '<div class="fg"><label>Esercizio '+(ri+1)+'</label><input type="text" id="b'+bi+'r'+ri+'n" value="'+e(row.name)+'" oninput="aggiorna()"></div>'+
        '<div class="r3">'+
        '<div class="fg"><label>Serie</label><input type="text" id="b'+bi+'r'+ri+'s" value="'+e(row.serie)+'" oninput="aggiorna()"></div>'+
        '<div class="fg"><label>Rip</label><input type="text" id="b'+bi+'r'+ri+'r" value="'+e(row.rip)+'" oninput="aggiorna()"></div>'+
        '<div class="fg"><label>Carico</label><input type="text" id="b'+bi+'r'+ri+'c" value="'+e(row.carico)+'" oninput="aggiorna()"></div>'+
        '</div>'+
        '<div class="fg"><label>Note</label><input type="text" id="b'+bi+'r'+ri+'no" value="'+e(row.note)+'" oninput="aggiorna()"></div>'+
        '<div class="esep"></div>';
    }).join('');
    return '<div class="bcard"><div class="bcard-top"><div class="dot '+dot+'"></div>'+
      '<input type="text" id="bl'+bi+'l" value="'+e(bl.label)+'" oninput="aggiorna()"></div>'+rows+'</div>';
  }).join('');
}
function buildAct(act){
  document.getElementById('form-act').innerHTML=act.map(function(ex,i){
    return '<div class="r2">'+
      '<div class="fg"><label>Es. '+(i+1)+'</label><input type="text" id="act'+i+'n" value="'+e(ex.name)+'" oninput="aggiorna()"></div>'+
      '<div class="fg"><label>Serie</label><input type="text" id="act'+i+'s" value="'+e(ex.sets)+'" oninput="aggiorna()"></div>'+
      '</div>';
  }).join('');
}
function readForm(){
  if(!cid) return;
  var a=db[cid];
  a.session=document.getElementById('f-sess').value;
  a.b1=document.getElementById('f-b1').value;
  a.b2=document.getElementById('f-b2').value;
  a.b3=document.getElementById('f-b3').value;
  a.footer=document.getElementById('f-footer').value;
  a.prep=document.getElementById('f-prep').value;
  a.blocks.forEach(function(bl,bi){
    var l=document.getElementById('bl'+bi+'l'); if(l) bl.label=l.value;
    bl.rows.forEach(function(row,ri){
      var n=document.getElementById('b'+bi+'r'+ri+'n'); if(n) row.name=n.value;
      var s=document.getElementById('b'+bi+'r'+ri+'s'); if(s) row.serie=s.value;
      var r=document.getElementById('b'+bi+'r'+ri+'r'); if(r) row.rip=r.value;
      var c=document.getElementById('b'+bi+'r'+ri+'c'); if(c) row.carico=c.value;
      var no=document.getElementById('b'+bi+'r'+ri+'no'); if(no) row.note=no.value;
    });
  });
  a.activation.forEach(function(ex,i){
    var n=document.getElementById('act'+i+'n'); if(n) ex.name=n.value;
    var s=document.getElementById('act'+i+'s'); if(s) ex.sets=s.value;
  });
}
function aggiorna(){ readForm(); renderPreview(); }

function renderPreview(){
  if(!cid) return;
  var a=db[cid];
  var actH=a.activation.map(function(ex,i){
    var st='';
    if(i%2===1) st+='border-right:none;';
    if(i>=a.activation.length-2) st+='border-bottom:none;';
    return '<div class="act-row" style="'+st+'"><span class="actn">'+(i+1)+'</span><span class="actex">'+e(ex.name)+'</span>'+(ex.sets?'<span class="acts">'+e(ex.sets)+'</span>':'')+'</div>';
  }).join('');
  var blH=a.blocks.map(function(bl,bi){
    var hc=bl.style==='blue'?'sbh-blue':'sbh-gray';
    var tc=bl.style==='blue'?'sbt-w':'sbt-g';
    var thead=bi===0?'<thead class="throw"><tr><th>Esercizio</th><th class="tc">Serie</th><th class="tc">Rip</th><th class="tc">Carico</th><th>Note</th></tr></thead>':'<thead class="noth"></thead>';
    var rows=bl.rows.map(function(row){
      return '<tr><td class="tn">'+e(row.name)+'</td><td class="tc">'+e(row.serie)+'</td><td class="tc">'+e(row.rip)+'</td><td class="tc">'+e(row.carico)+'</td><td class="tno">'+e(row.note)+'</td></tr>';
    }).join('');
    return '<div class="ssep"></div><div class="sblock"><div class="sbhead '+hc+'"><span class="sbtag '+tc+'">'+e(bl.label)+'</span></div>'+
      '<table class="stable"><colgroup><col class="cn"><col class="cs"><col class="cr"><col class="cc"><col class="cno"></colgroup>'+thead+'<tbody>'+rows+'</tbody></table></div>';
  }).join('');

  document.getElementById('preview').innerHTML=
    '<div class="page">'+
    '<div class="sh">'+
    '<div class="sh-logo">'+
    '<svg width="36" height="44" viewBox="0 0 100 120" fill="none" xmlns="http://www.w3.org/2000/svg">'+
    '<path d="M50 2 L92 18 L92 60 C92 88 50 118 50 118 C50 118 8 88 8 60 L8 18 Z" fill="white" fill-opacity="0.2" stroke="white" stroke-width="2"/>'+
    '<text x="50" y="78" text-anchor="middle" font-family="sans-serif" font-size="40" font-weight="700" fill="white">FIP</text>'+
    '<rect x="24" y="8" width="14" height="6" rx="1" fill="#009246"/>'+
    '<rect x="41" y="6" width="18" height="6" rx="1" fill="white"/>'+
    '<rect x="62" y="8" width="14" height="6" rx="1" fill="#C8102E"/>'+
    '</svg>'+

function salva(){
  readForm();
  var json=JSON.stringify(db,null,2);
  var blob=new Blob([json],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url; a.download='fip_atleti.json'; a.click();
  URL.revokeObjectURL(url);
  var btn=document.getElementById('btn-salva');
  btn.textContent='Salvato ✓';
  setTimeout(function(){btn.textContent='Salva JSON';},1500);
}
